_format_version: "3.0"
_transform: true

########################################################
# SERVICES
########################################################

services:
  - name: health-services-api
    host: health-services-api
    port: 80
    protocol: http
    path: /v2/api
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    tags:
      - env:dev
      - team:ps-asset-team
      - app:health-services-api
    routes:
      - name: health-services-api-get-healthservices
        protocols:
          - https
          - http
        methods:
          - GET
        hosts:
          - google.com
        paths:
          - /v1/healthservices
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev
      - name: health-services-api-post-healthservices
        protocols:
          - https
          - http
        methods:
          - POST
        hosts:
          - google.com
        paths:
          - /v1/healthservices
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev
      - name: health-services-api-get-healthservices-id
        protocols:
          - https
          - http
        methods:
          - GET
        hosts:
          - google.com
        paths:
          - /v1/healthservices/:id
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev

########################################################
# PLUGINS
########################################################

plugins:
  - name: rate-limiting
    service: health-services-api
    enabled: true
    protocols:
      - http
      - https
    config:
      minute: 100
      hour: 5000
      policy: local
      fault_tolerant: true
      hide_client_headers: false
      error_code: 429
      error_message: API rate limit exceeded
    tags:
      - service
      - rate-limit
  - name: key-auth
    service: health-services-api
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: true
      hide_credentials: true
  - name: jwt
    service: health-services-api
    config:
      uri_param_names:
        - jwt
      cookie_names:
        []
      header_names:
        - Authorization
      key_claim_name: iss
      secret_is_base64: false
      claims_to_verify:
        - exp
      anonymous: null
      run_on_preflight: true
      maximum_expiration: 0
  - name: cors
    service: health-services-api
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false
  - name: ip-restriction
    service: health-services-api
    config:
      allow:
        - 127.0.0.1
        - 10.0.0.0/8
        - 192.168.0.0/16
      deny: null
      status: 403
      message: Your IP is not allowed

########################################################
# UPSTREAMS + TARGETS
########################################################

upstreams:
  - name: health-services-api
    algorithm: round-robin
    slots: 10000
    targets:
      - target: google.com:443
        weight: 100
