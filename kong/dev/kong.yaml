_format_version: "3.0"
_transform: true

########################################################
# SERVICES
########################################################

services:
  - name: health-services-api
    host: health-services-api
    port: 80
    protocol: http
    path: /v2/api
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    tags:
      - env:dev
      - team:ps-asset-team
      - app:health-services-api
    routes:
      - name: health-services-api-get-health-services-api
        protocols:
          - https
          - http
        methods:
          - GET
        hosts:
          - google.com
        paths:
          - /v1/health-services-api
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev
      - name: health-services-api-post-health-services-api
        protocols:
          - https
          - http
        methods:
          - POST
        hosts:
          - google.com
        paths:
          - /v1/health-services-api
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev
      - name: health-services-api-get-health-services-api-id
        protocols:
          - https
          - http
        methods:
          - GET
        hosts:
          - google.com
        paths:
          - /v1/health-services-api/:id
        strip_path: true
        preserve_host: false
        https_redirect_status_code: 426
        tags:
          - env:dev

########################################################
# PLUGINS
########################################################

plugins:
  []

########################################################
# UPSTREAMS + TARGETS
########################################################

upstreams:
  - name: health-services-api
    algorithm: round-robin
    slots: 10000
    targets:
      - target: google.com:443
        weight: 100
